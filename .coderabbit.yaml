# CodeRabbit AI code review configuration.
# Adds an AI pair-reviewer to every PR (including Dependabot's). Critical
# maintenance hedge for solo OSS maintainers during academic terms — catches
# obvious issues before Said spends his scarce minutes on them.
#
# Reference: https://docs.coderabbit.ai/guides/configure-coderabbit
language: "en-US"

reviews:
  profile: "chill"  # less aggressive than 'assertive'; reduces noise on small PRs
  request_changes_workflow: false
  high_level_summary: true
  poem: false  # disable the rhyming summary; we want signal not entertainment
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
      - "planning/.*"
  path_filters:
    - "!ui/dist/**"
    - "!ui/node_modules/**"
    - "!backend/.venv/**"
    - "!**/*.lock"
    - "!**/*.min.js"
    - "!**/__pycache__/**"
    - "!**/.pytest_cache/**"
  path_instructions:
    - path: "backend/**/*.py"
      instructions: |
        Backend is FastAPI + Pydantic v2. Flag: missing type hints, unhandled
        exceptions in routes, missing await on async calls, schema changes on
        protected files (api_models.py is protected — major flag if modified).
    - path: "ui/src/**/*.{ts,tsx}"
      instructions: |
        Frontend is React 18 + Vite + Tailwind + shadcn/ui + Zustand + Recharts.
        Flag: any `any` casts, hardcoded colors (use theme tokens), missing
        keyboard nav on interactive elements, `||` for numeric fallbacks
        (must use `??`), missing tests for new components.
    - path: "docs/active/**"
      instructions: |
        Active project documentation. Flag stale references, broken links,
        scientific definitions that drift from PELEG_FEEDBACK_INSTRUCTIONS.md.

chat:
  auto_reply: true

# Tone for PR comments — peer-to-peer, not condescending
tone_instructions: |
  Said is a builder-operator who wants high-signal feedback. Prefer short,
  specific comments over long explanations. Don't repeat 'consider' or 'might
  want to' — say what's wrong and what to change.
