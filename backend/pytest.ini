[pytest]
# Pytest configuration for deterministic, fast tests
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings
# Note: USE_TANGO=0 and USE_PSIPRED=0 are set in Makefile for deterministic tests

