# Pre-commit hooks for lightweight guardrails
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Python formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff-format
        name: Format Python (ruff)
        files: ^backend/.*\.py$
      - id: ruff-check
        name: Lint Python (ruff)
        files: ^backend/.*\.py$
        args: [--fix]

  # TypeScript formatting via local command
  - repo: local
    hooks:
      - id: prettier
        name: Format TypeScript (prettier)
        entry: bash -c 'cd ui && npx prettier --write "src/**/*.{ts,tsx}" || true'
        language: system
        files: ^ui/src/.*\.(ts|tsx)$
        pass_filenames: false
        always_run: false

  # TypeScript linting via local command
  - repo: local
    hooks:
      - id: eslint
        name: Lint TypeScript (eslint)
        entry: bash -c 'cd ui && npm run lint'
        language: system
        files: ^ui/src/.*\.(ts|tsx)$
        pass_filenames: false
        always_run: false

  # Fast unit tests (lightweight, no network)
  # Runs only if Python files are staged (backend/**.py)
  - repo: local
    hooks:
      - id: test-unit
        name: Run fast unit tests
        entry: bash -c 'cd backend && USE_TANGO=0 USE_PSIPRED=0 python -m pytest tests/test_api_contracts.py tests/test_uniprot_query_parsing.py tests/test_uniprot_sort.py tests/test_trace_id.py -v --tb=short'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
        always_run: false
        stages: [commit]

