# =============================================================================
# Peptide Visual Lab - Docker Compose (Production)
# Extends base with resource limits, restart policy, and structured logging.
# =============================================================================
# Usage:
#   docker compose -f docker/docker-compose.prod.yml up -d
#   docker compose -f docker/docker-compose.prod.yml logs -f
#   docker compose -f docker/docker-compose.prod.yml down
# =============================================================================

include:
  - docker-compose.base.yml

services:
  # ---------------------------------------------------------------------------
  # Backend API Service (prod overrides)
  # ---------------------------------------------------------------------------
  backend:
    image: pvl-backend:latest
    container_name: pvl-backend
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    healthcheck:
      start_period: 20s
    restart: always
    deploy:
      resources:
        limits:
          cpus: '3'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis (prod overrides)
  # ---------------------------------------------------------------------------
  redis:
    container_name: pvl-redis
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 192M
        reservations:
          cpus: '0.05'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Celery Batch Worker (prod overrides)
  # ---------------------------------------------------------------------------
  celery-batch:
    image: pvl-backend:latest
    container_name: pvl-celery-batch
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Celery Quick Worker (prod overrides)
  # ---------------------------------------------------------------------------
  celery-quick:
    image: pvl-backend:latest
    container_name: pvl-celery-quick
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Frontend Service (prod overrides)
  # ---------------------------------------------------------------------------
  frontend:
    image: pvl-frontend:latest
    container_name: pvl-frontend
    ports:
      - "80:80"
      - "3000:80"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# =============================================================================
# Networks (optional - for additional services like monitoring)
# =============================================================================
networks:
  default:
    name: pvl-network
