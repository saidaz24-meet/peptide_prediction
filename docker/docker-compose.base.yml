# =============================================================================
# Peptide Visual Lab - Docker Compose (Base)
# Shared service definitions extended by dev and prod overrides.
# =============================================================================
# Do NOT run this file directly. Use:
#   docker compose -f docker/docker-compose.yml up        (dev)
#   docker compose -f docker/docker-compose.prod.yml up   (prod)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Backend API Service (base definition)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        PYTHON_VERSION: "3.11"
    volumes:
      # Persistent data volumes
      - pvl-runs:/data/runs
      - pvl-uploads:/data/uploads
      # Tool assets (bind-mount from project root tools/ directory)
      - ${TOOLS_HOST_PATH:-../tools}:/opt/tools:ro
      # Runtime cache
      - pvl-cache:/data/cache
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      # Provider flags (both ON — requires tools volume mounted)
      - USE_TANGO=${USE_TANGO:-1}
      - USE_S4PRED=${USE_S4PRED:-1}
      # Tool paths (in mounted volumes)
      - TANGO_BINARY_PATH=/opt/tools/tango/bin/tango_linux_x86_64
      - S4PRED_MODEL_PATH=/opt/tools/s4pred/models
      # Optional: Sentry DSN
      - SENTRY_DSN=${SENTRY_DSN:-}
      # TANGO scratch directory (on named volume, not overlay)
      - TANGO_RUNTIME_DIR=/data/runs/tango
      # Celery / Redis (enabled when redis service is present)
      - CELERY_ENABLED=${CELERY_ENABLED:-1}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Redis (Message Broker + Result Backend)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    volumes:
      - pvl-redis:/data
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Celery Worker — Batch Queue (heavy analysis jobs)
  # ---------------------------------------------------------------------------
  celery-batch:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        PYTHON_VERSION: "3.11"
    command: >
      celery -A celery_app worker
      --queues=batch
      --concurrency=2
      --pool=prefork
      --max-tasks-per-child=500
      --loglevel=info
      --hostname=batch@%h
    volumes:
      - pvl-runs:/data/runs
      - pvl-uploads:/data/uploads
      - ${TOOLS_HOST_PATH:-../tools}:/opt/tools:ro
      - pvl-cache:/data/cache
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - USE_TANGO=${USE_TANGO:-1}
      - USE_S4PRED=${USE_S4PRED:-1}
      - TANGO_BINARY_PATH=/opt/tools/tango/bin/tango_linux_x86_64
      - S4PRED_MODEL_PATH=/opt/tools/s4pred/models
      - SENTRY_DSN=${SENTRY_DSN:-}
      - TANGO_RUNTIME_DIR=/data/runs/tango
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping --destination batch@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Celery Worker — Quick Queue (single-sequence predictions)
  # ---------------------------------------------------------------------------
  celery-quick:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        PYTHON_VERSION: "3.11"
    command: >
      celery -A celery_app worker
      --queues=quick
      --concurrency=2
      --pool=prefork
      --max-tasks-per-child=500
      --loglevel=info
      --hostname=quick@%h
    volumes:
      - pvl-runs:/data/runs
      - pvl-uploads:/data/uploads
      - pvl-cache:/data/cache
      - ${TOOLS_HOST_PATH:-../tools}:/opt/tools:ro
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - USE_TANGO=${USE_TANGO:-1}
      - USE_S4PRED=${USE_S4PRED:-1}
      - TANGO_BINARY_PATH=/opt/tools/tango/bin/tango_linux_x86_64
      - S4PRED_MODEL_PATH=/opt/tools/s4pred/models
      - SENTRY_DSN=${SENTRY_DSN:-}
      - TANGO_RUNTIME_DIR=/data/runs/tango
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping --destination quick@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Frontend Service (base definition)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ""
        VITE_SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      backend:
        condition: service_healthy

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  pvl-runs:
    driver: local
  pvl-uploads:
    driver: local
  pvl-cache:
    driver: local
  pvl-redis:
    driver: local
