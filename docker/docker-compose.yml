# =============================================================================
# Peptide Visual Lab - Docker Compose (Development)
# Extends base with hot-reload, debug logging, and dev CORS origins.
# =============================================================================
# Usage:
#   docker compose -f docker/docker-compose.yml up --build
#   docker compose -f docker/docker-compose.yml down -v
# =============================================================================

include:
  - docker-compose.base.yml

services:
  # ---------------------------------------------------------------------------
  # Backend API Service (dev overrides)
  # ---------------------------------------------------------------------------
  backend:
    container_name: pvl-backend-dev
    ports:
      - "8000:8000"
    volumes:
      # Source code mount for hot reload (development only)
      - ../backend:/app:cached
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      # CORS (allow frontend dev server)
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173
    healthcheck:
      interval: 10s
    restart: unless-stopped
    # Override CMD for development with reload
    command: ["python", "-m", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # ---------------------------------------------------------------------------
  # Celery Workers (dev overrides)
  # ---------------------------------------------------------------------------
  celery-batch:
    container_name: pvl-celery-batch-dev
    volumes:
      - ../backend:/app:cached
    environment:
      - LOG_LEVEL=DEBUG
    restart: unless-stopped

  celery-quick:
    container_name: pvl-celery-quick-dev
    volumes:
      - ../backend:/app:cached
    environment:
      - LOG_LEVEL=DEBUG
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis (dev overrides)
  # ---------------------------------------------------------------------------
  redis:
    container_name: pvl-redis-dev
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Flower Monitoring (optional — run with: docker compose --profile monitoring up)
  # ---------------------------------------------------------------------------
  flower:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: pvl-flower-dev
    command: celery -A celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - monitoring
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend Service (dev overrides)
  # ---------------------------------------------------------------------------
  frontend:
    container_name: pvl-frontend-dev
    ports:
      - "3000:80"
    restart: unless-stopped
